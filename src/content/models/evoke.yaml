description:
  nl: "De Evoke is ons populairste middenklasse model met een indrukwekkende woonkeuken van 19 m² en een stijlvol zadeldak. De bergruimte en ruime badkamer maken dit tot een volwaardig alternatief voor een traditionele woning. Met 42,6 m² leefruimte biedt de Evoke alles wat je nodig hebt, zonder concessies."
  fr: "L'Evoke est notre modele milieu de gamme le plus populaire, avec un impressionnant sejour-cuisine de 19 m² et un elegant toit a deux pans. Le cellier et la salle de bain spacieuse en font une veritable alternative a une habitation traditionnelle. Avec 42,6 m² habitables, l'Evoke offre tout ce dont vous avez besoin, sans compromis."
  en: "The Evoke is our most popular mid-range model, featuring an impressive 19 m² kitchen-living area and a stylish gable roof. The utility room and spacious bathroom make it a full-fledged alternative to a traditional home. With 42.6 m² of living space, the Evoke offers everything you need, without compromise."
