description:
  nl: "De Auxin valt op door zijn brede opzet met hoekramen die een panoramisch uitzicht bieden en de ruimte met natuurlijk licht vullen. Het zadeldak en de royale woonkeuken van 16 m² geven dit model een echte huiselijke uitstraling. Compact in footprint, maar groots in beleving."
  fr: "L'Auxin se distingue par sa conception large avec des fenetres d'angle offrant une vue panoramique et baignant l'espace de lumiere naturelle. Le toit a deux pans et le genereux sejour-cuisine de 16 m² conferent a ce modele une veritable atmosphere de maison. Compact en empreinte, mais grandiose en experience."
