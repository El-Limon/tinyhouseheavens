description:
  nl: "De Solin brengt de spa-ervaring naar je eigen tiny house met een ingebouwde sauna van 6 m². Na een ontspannende saunasessie geniet je van de ruime woonkeuken en comfortabele slaapkamer. Dit unieke model bewijst dat wellness en compact wonen perfect samengaan."
  fr: "Le Solin apporte l'experience spa dans votre propre tiny house avec un sauna integre de 6 m². Apres une seance de sauna relaxante, profitez du spacieux sejour-cuisine et de la chambre confortable. Ce modele unique prouve que bien-etre et habitat compact vont parfaitement ensemble."
  en: "The Solin brings the spa experience to your own tiny house with a built-in 6 m² sauna. After a relaxing sauna session, enjoy the spacious kitchen-living area and comfortable bedroom. This unique model proves that wellness and compact living go perfectly together."
