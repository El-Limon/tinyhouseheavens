description:
  nl: "De Serein staat voor rust en evenwicht met een harmonieuze verdeling van leef- en slaapruimte. De ruime slaapkamer van 9,8 m² en goed proportioneerde woonkeuken zorgen voor dagelijks comfort. Een tijdloos ontwerp dat zich moeiteloos aanpast aan elke omgeving."
  fr: "Le Serein incarne le calme et l'equilibre avec une repartition harmonieuse des espaces de vie et de nuit. La chambre spacieuse de 9,8 m² et le sejour-cuisine bien proportionne assurent un confort quotidien. Un design intemporel qui s'adapte sans effort a tout environnement."
  en: "The Serein stands for calm and balance, with a harmonious distribution of living and sleeping space. The spacious 9.8 m² bedroom and well-proportioned kitchen-living area ensure everyday comfort. A timeless design that effortlessly adapts to any setting."
