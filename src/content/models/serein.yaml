description:
  nl: "De Serein staat voor rust en evenwicht met een harmonieuze verdeling van leef- en slaapruimte. De ruime badkamer van 4,5 m² en goed proportioneerde woonkeuken zorgen voor dagelijks comfort. Een tijdloos ontwerp dat zich moeiteloos aanpast aan elke omgeving."
  fr: "Le Serein incarne le calme et l'equilibre avec une repartition harmonieuse des espaces de vie et de nuit. La salle de bain spacieuse de 4,5 m² et le sejour-cuisine bien proportionne assurent un confort quotidien. Un design intemporel qui s'adapte sans effort a tout environnement."
