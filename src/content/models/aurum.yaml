description:
  nl: "De Aurum is ontworpen voor wie dicht bij elkaar wil wonen, maar toch gescheiden. Twee onafhankelijke wooneenheden onder een dak bieden maximale privacy voor elk gezin. Geen gedeelde gangen of doorgangen – enkel je persoonlijke ruimte met een eigen ingang en terras. Modern design, grote ramen met uitzicht op de natuur en doordachte energie-efficientie maken deze woning niet alleen stijlvol, maar ook zeer comfortabel voor dagelijks wonen."
  fr: "L'Aurum est concu pour ceux qui veulent vivre proches, mais separes. Deux unites independantes sous un meme toit offrent une intimite maximale a chaque famille. Pas de couloirs ou de passages partages – juste votre espace personnel avec une entree privee et une terrasse. Un design moderne, de grandes fenetres offrant une vue sur la nature et une efficacite energetique reflechie font de cette maison un lieu non seulement elegant, mais aussi tres confortable au quotidien."
  en: "The Aurum is designed for those who want to live close, yet separated. Two independent units under one roof provide maximum privacy for each family. No shared corridors or passages – just your personal space with a private entrance and terrace. Modern design, large windows offering views of nature and thoughtful energy efficiency make this home not only stylish but also very comfortable for daily living."
tagline:
  nl: "Samen wonen, apart leven"
  fr: "Vivre ensemble, chacun chez soi"
  en: "Living together, apart"
