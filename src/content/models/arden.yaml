description:
  nl: "De Arden onderscheidt zich met een karakteristiek zadeldak en een doordachte open indeling met een ruime leefzone van bijna 15 m² en een aparte badkamer. Ondanks het compacte formaat biedt dit model maximaal leefgemak. Het schuine dak geeft een warme, huiselijke uitstraling."
  fr: "L'Arden se distingue par son toit a deux pans caracteristique et un agencement ouvert bien pense avec un espace de vie de pres de 15 m² et une salle de bain separee. Malgre son format compact, ce modele offre un maximum de confort. Le toit en pente confere une atmosphere chaleureuse et accueillante."
  en: "The Arden stands out with its characteristic gable roof and a well-thought-out open layout with a spacious 15 m² living area and a separate bathroom. Despite its compact size, this model offers maximum living comfort. The pitched roof gives it a warm, homely feel."
