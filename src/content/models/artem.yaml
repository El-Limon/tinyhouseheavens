description:
  nl: "De Artem is een uniek wellnessmodel met een ingebouwde stoomcabine en aparte doucheruimte voor de ultieme ontspanning. De woonkeuken van 9 m² biedt een gezellige plek om tot rust te komen na je wellnessritueel. Ook beschikbaar met een vergroot terras voor nog meer buitenbeleving."
  fr: "L'Artem est un modele wellness unique avec un hammam integre et une douche separee pour une relaxation ultime. Le sejour-cuisine de 9 m² offre un endroit convivial pour se detendre apres votre rituel bien-etre. Egalement disponible avec une terrasse agrandie pour encore plus de vie en plein air."
  en: "The Artem is a unique wellness model with a built-in steam room and separate shower area for the ultimate relaxation. The 9 m² kitchen-living area provides a cosy spot to unwind after your wellness ritual. Also available with an enlarged terrace for even more outdoor living."
