description:
  nl: "De Vella is ons meest compacte tiny house, perfect voor wie de essentie van klein wonen wil ervaren. Met een slimme indeling biedt deze studio alles wat je nodig hebt op slechts 8,3 m² leefruimte. Ideaal als starterswoning, gastenverblijf of tuinkantoor."
  fr: "La Vella est notre tiny house la plus compacte, parfaite pour ceux qui veulent vivre l'essentiel de la vie en petit. Avec un agencement intelligent, ce studio offre tout le necessaire sur seulement 8,3 m² habitables. Ideal comme logement de depart, chambre d'amis ou bureau de jardin."
  en: "The Vella is our most compact tiny house, perfect for those who want to experience the essence of small living. With a smart layout, this studio offers everything you need in just 8.3 m² of living space. Ideal as a starter home, guest house, or garden office."
