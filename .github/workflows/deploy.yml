name: Build and Deploy to Hostinger

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_CRM_WEBHOOK_URL: ${{ secrets.PUBLIC_CRM_WEBHOOK_URL }}
          PUBLIC_CRM_WEBHOOK_SECRET: ${{ secrets.PUBLIC_CRM_WEBHOOK_SECRET }}

      - name: Deploy to Hostinger via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 145.79.20.109 >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete -e "ssh -p 65002" dist/ u623062303@145.79.20.109:domains/tinyhouseheavens.com/public_html/
