      - generic [ref=e145]:
        - paragraph [ref=e146]: Duurzaamheid staat centraal in alles wat we doen bij Tiny House Heavens. Onze modulaire tiny houses zijn ontworpen om het energieverbruik te minimaliseren door superieure isolatie (150-200 mm), luchtdichte constructie en de mogelijkheid voor zonnepanelen en warmtepompen.
        - paragraph [ref=e147]:
          - text: Door te kiezen voor compact wonen vermindert u niet alleen uw ecologische voetafdruk, maar ook uw maandelijkse kosten. Een kleiner woonoppervlak betekent minder energie voor verwarming en minder materiaalgebruik tijdens de bouw. Bekijk onze
          - link "20 modellen" [ref=e148] [cursor=pointer]:
            - /url: /nl/modellen
          - text: en ontdek welke tiny house bij uw duurzame levensstijl past.
