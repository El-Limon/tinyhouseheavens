        - heading "Onze Missie" [level=2] [ref=e40]
        - paragraph [ref=e41]: Onze missie is het bouwen van energie-efficiente, comfortabele en volledig modulaire Tiny House Units met onvergelijkbare waarde.
      - generic [ref=e42]:
        - paragraph [ref=e43]: Tiny House Heavens ontwerpt en produceert volledig modulaire tiny houses met een focus op kwaliteit, duurzaamheid en betaalbaarheid. Onze units worden gebouwd met frame-modulaire constructie, wat betekent dat elke woning op maat kan worden geconfigureerd en eenvoudig getransporteerd.
        - paragraph [ref=e44]: Met een collectie van 20 unieke modellen -- van compacte 13 m² studio's tot ruime 112 m² gezinswoningen -- bieden wij een oplossing voor elke levensstijl. Of u nu een starterswoning zoekt, een bijgebouw voor uw tuin, of een volledig autonoom huis, wij maken het mogelijk.
