        - heading "Notre Mission" [level=2] [ref=e40]
        - paragraph [ref=e41]: Notre mission est de construire des Tiny House Units modulaires, economes en energie, confortables et d'une valeur incomparable.
      - generic [ref=e42]:
        - paragraph [ref=e43]: Tiny House Heavens concoit et produit des tiny houses entierement modulaires avec un accent sur la qualite, la durabilite et l'accessibilite. Nos unites sont construites avec une construction modulaire a ossature, ce qui signifie que chaque maison peut etre configuree sur mesure et facilement transportee.
        - paragraph [ref=e44]: Avec une collection de 20 modeles uniques -- des studios compacts de 13 m² aux maisons familiales spacieuses de 112 m² -- nous offrons une solution pour chaque style de vie. Que vous cherchiez un logement de depart, une dependance pour votre jardin ou une maison entierement autonome, nous le rendons possible.
