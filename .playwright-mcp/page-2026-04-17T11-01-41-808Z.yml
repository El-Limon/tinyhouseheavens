        - paragraph [ref=e140]: Fondateur
        - paragraph [ref=e141]: Avec une passion pour l'habitat durable et abordable, Thomas a fonde Tiny House Heavens pour rendre la vie en tiny house modulaire accessible a tous en Europe.
    - generic [ref=e143]:
      - heading "Construire Durablement pour l'Avenir" [level=2] [ref=e144]
      - generic [ref=e145]:
        - paragraph [ref=e146]: La durabilite est au coeur de tout ce que nous faisons chez Tiny House Heavens. Nos tiny houses modulaires sont concues pour minimiser la consommation d'energie grace a une isolation superieure (150-200 mm), une construction etanche a l'air et la possibilite d'installer des panneaux solaires et des pompes a chaleur.
        - paragraph [ref=e147]:
          - text: En choisissant un habitat compact, vous reduisez non seulement votre empreinte ecologique, mais aussi vos couts mensuels. Une surface habitable plus petite signifie moins d'energie pour le chauffage et moins de materiaux utilises lors de la construction. Decouvrez nos
          - link "20 modeles" [ref=e148] [cursor=pointer]:
            - /url: /fr/modeles
          - text: et trouvez la tiny house qui correspond a votre style de vie durable.
